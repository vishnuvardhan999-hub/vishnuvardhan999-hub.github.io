  <text x="102" y="345" fill="#e43f5a" font-size="26" font-weight="700" text-anchor="middle">3,818</text>
  <text x="102" y="365" fill="#8892b0" font-size="10" text-anchor="middle">TOTAL LISTINGS</text>

  <rect x="205" y="318" width="185" height="65" fill="#162447" rx="4"/>
  <text x="297" y="345" fill="#f5a623" font-size="26" font-weight="700" text-anchor="middle">$127</text>
  <text x="297" y="365" fill="#8892b0" font-size="10" text-anchor="middle">AVG NIGHTLY PRICE</text>

  <rect x="400" y="318" width="185" height="65" fill="#162447" rx="4"/>
  <text x="492" y="345" fill="#06d6a0" font-size="26" font-weight="700" text-anchor="middle">66.5%</text>
  <text x="492" y="365" fill="#8892b0" font-size="10" text-anchor="middle">ENTIRE HOME/APT</text>

  <rect x="595" y="318" width="195" height="65" fill="#162447" rx="4"/>
  <text x="692" y="345" fill="#ffd166" font-size="26" font-weight="700" text-anchor="middle">Broadway</text>
