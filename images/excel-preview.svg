<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Segoe UI',sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#f0f4f0"/>

  <!-- Title bar -->
  <rect width="800" height="48" fill="#1d6f42"/>
  <text x="20" y="31" fill="#ffffff" font-size="14" font-weight="700" letter-spacing="1">🚲  BIKE SALES DASHBOARD</text>
  <text x="650" y="31" fill="#a8d5b5" font-size="11">Excel Pivot Dashboard</text>

  <!-- Slicer panel -->
  <rect x="10" y="58" width="150" height="382" fill="#ffffff" rx="4" stroke="#c8e6c9" stroke-width="1"/>
  <text x="20" y="78" fill="#1d6f42" font-size="11" font-weight="700">FILTERS</text>

  <text x="20" y="100" fill="#555" font-size="10" font-weight="700">MARITAL STATUS</text>
  <rect x="20" y="106" width="120" height="22" fill="#1d6f42" rx="3"/>
  <text x="28" y="121" fill="#fff" font-size="10">● Married</text>
  <rect x="20" y="132" width="120" height="22" fill="#f0f4f0" rx="3" stroke="#c8e6c9" stroke-width="1"/>
  <text x="28" y="147" fill="#555" font-size="10">○ Single</text>

  <text x="20" y="172" fill="#555" font-size="10" font-weight="700">REGION</text>
  <rect x="20" y="178" width="120" height="22" fill="#1d6f42" rx="3"/>
  <text x="28" y="193" fill="#fff" font-size="10">● Europe</text>
  <rect x="20" y="204" width="120" height="22" fill="#f0f4f0" rx="3" stroke="#c8e6c9" stroke-width="1"/>
  <text x="28" y="219" fill="#555" font-size="10">○ North America</text>
  <rect x="20" y="230" width="120" height="22" fill="#f0f4f0" rx="3" stroke="#c8e6c9" stroke-width="1"/>
  <text x="28" y="245" fill="#555" font-size="10">○ Pacific</text>

  <text x="20" y="270" fill="#555" font-size="10" font-weight="700">EDUCATION</text>
  <rect x="20" y="276" width="120" height="22" fill="#1d6f42" rx="3"/>
  <text x="28" y="291" fill="#fff" font-size="10">● Bachelors</text>
  <rect x="20" y="302" width="120" height="22" fill="#f0f4f0" rx="3" stroke="#c8e6c9" stroke-width="1"/>
  <text x="28" y="317" fill="#555" font-size="10">○ Graduate Degree</text>
  <rect x="20" y="328" width="120" height="22" fill="#f0f4f0" rx="3" stroke="#c8e6c9" stroke-width="1"/>
  <text x="28" y="343" fill="#555" font-size="10">○ High School</text>

  <!-- Chart 1: Avg Income by Gender -->
  <rect x="170" y="58" width="295" height="190" fill="#ffffff" rx="4" stroke="#c8e6c9" stroke-width="1"/>
  <text x="182" y="78" fill="#1d6f42" font-size="11" font-weight="700">AVG INCOME BY GENDER &amp; PURCHASE</text>

  <!-- Grouped bars -->
  <!-- Female -->
  <rect x="200" y="140" width="40" height="80" fill="#1d6f42" rx="2"/>
  <text x="220" y="136" fill="#555" font-size="9" text-anchor="middle">$53.4k</text>
  <rect x="248" y="120" width="40" height="100" fill="#4caf50" rx="2"/>
  <text x="268" y="116" fill="#555" font-size="9" text-anchor="middle">$55.8k</text>

  <!-- Male -->
  <rect x="330" y="130" width="40" height="90" fill="#1d6f42" rx="2"/>
  <text x="350" y="126" fill="#555" font-size="9" text-anchor="middle">$56.2k</text>
  <rect x="378" y="100" width="40" height="120" fill="#4caf50" rx="2"/>
  <text x="398" y="96" fill="#555" font-size="9" text-anchor="middle">$60.1k</text>

  <!-- Baseline -->
  <line x1="185" y1="220" x2="440" y2="220" stroke="#c8e6c9" stroke-width="1"/>
  <text x="220" y="234" fill="#555" font-size="9" text-anchor="middle">Female</text>
  <text x="360" y="234" fill="#555" font-size="9" text-anchor="middle">Male</text>

  <!-- Legend -->
  <rect x="185" y="240" width="10" height="10" fill="#1d6f42"/>
  <text x="200" y="250" fill="#555" font-size="9">No Purchase</text>
  <rect x="265" y="240" width="10" height="10" fill="#4caf50"/>
  <text x="280" y="250" fill="#555" font-size="9">Purchased</text>

  <!-- Chart 2: Commute Distance -->
  <rect x="475" y="58" width="315" height="190" fill="#ffffff" rx="4" stroke="#c8e6c9" stroke-width="1"/>
  <text x="487" y="78" fill="#1d6f42" font-size="11" font-weight="700">PURCHASES BY COMMUTE DISTANCE</text>

  <!-- Bars horizontal -->
  <text x="487" y="100" fill="#8892b0" font-size="9">0-1 Miles</text>
  <rect x="560" y="88" width="166" height="14" fill="#1d6f42" rx="2"/>
  <text x="730" y="100" fill="#1d6f42" font-size="9" font-weight="700">200</text>

  <text x="487" y="122" fill="#8892b0" font-size="9">1-2 Miles</text>
  <rect x="560" y="110" width="77" height="14" fill="#4caf50" rx="2"/>
  <text x="642" y="122" fill="#555" font-size="9">77</text>

  <text x="487" y="144" fill="#8892b0" font-size="9">2-5 Miles</text>
  <rect x="560" y="132" width="95" height="14" fill="#4caf50" rx="2"/>
  <text x="660" y="144" fill="#555" font-size="9">95</text>

  <text x="487" y="166" fill="#8892b0" font-size="9">5-10 Miles</text>
  <rect x="560" y="154" width="76" height="14" fill="#a5d6a7" rx="2"/>
  <text x="641" y="166" fill="#555" font-size="9">76</text>

  <text x="487" y="188" fill="#8892b0" font-size="9">10+ Miles</text>
  <rect x="560" y="176" width="33" height="14" fill="#a5d6a7" rx="2"/>
  <text x="598" y="188" fill="#555" font-size="9">33</text>

  <text x="487" y="240" fill="#8892b0" font-size="9">★ Short commuters buy the most bikes</text>

  <!-- Chart 3: Age Bracket -->
  <rect x="170" y="258" width="295" height="175" fill="#ffffff" rx="4" stroke="#c8e6c9" stroke-width="1"/>
  <text x="182" y="278" fill="#1d6f42" font-size="11" font-weight="700">PURCHASES BY AGE BRACKET</text>

  <!-- Bars -->
  <text x="220" y="300" fill="#8892b0" font-size="9" text-anchor="middle">Adolescent</text>
  <rect x="195" y="305" width="50" height="39" fill="#a5d6a7" rx="2"/>
  <text x="220" y="352" fill="#555" font-size="9" text-anchor="middle">39</text>

  <text x="330" y="300" fill="#8892b0" font-size="9" text-anchor="middle">Middle Age</text>
  <rect x="305" y="257" width="50" height="87" fill="#1d6f42" rx="2"/>
  <text x="330" y="352" fill="#1d6f42" font-size="10" text-anchor="middle" font-weight="700">383 ★</text>

  <text x="430" y="300" fill="#8892b0" font-size="9" text-anchor="middle">Old</text>
  <rect x="405" y="315" width="50" height="29" fill="#a5d6a7" rx="2"/>
  <text x="430" y="352" fill="#555" font-size="9" text-anchor="middle">59</text>

  <line x1="185" y1="344" x2="460" y2="344" stroke="#c8e6c9" stroke-width="1"/>
  <text x="182" y="420" fill="#8892b0" font-size="9">IF formula: =IF(Age&gt;54,"Old",IF(Age&gt;=31,"Middle Age","Adolescent"))</text>

  <!-- KPI Cards -->
  <rect x="475" y="258" width="95" height="80" fill="#1d6f42" rx="4"/>
  <text x="522" y="290" fill="#fff" font-size="22" font-weight="700" text-anchor="middle">1,000</text>
  <text x="522" y="310" fill="#a8d5b5" font-size="9" text-anchor="middle">CUSTOMERS</text>

  <rect x="578" y="258" width="95" height="80" fill="#388e3c" rx="4"/>
  <text x="625" y="290" fill="#fff" font-size="22" font-weight="700" text-anchor="middle">481</text>
  <text x="625" y="310" fill="#a8d5b5" font-size="9" text-anchor="middle">PURCHASED</text>

  <rect x="681" y="258" width="109" height="80" fill="#2e7d32" rx="4"/>
  <text x="735" y="290" fill="#fff" font-size="22" font-weight="700" text-anchor="middle">48.1%</text>
  <text x="735" y="310" fill="#a8d5b5" font-size="9" text-anchor="middle">BUY RATE</text>

  <!-- Footer -->
  <rect y="420" width="800" height="30" fill="#1d6f42"/>
  <text x="20" y="439" fill="#a8d5b5" font-size="10">Excel  •  Pivot Tables  •  Nested IF  •  Find &amp; Replace  •  Slicers  •  Charts  •  Dashboard Design</text>
</svg>
